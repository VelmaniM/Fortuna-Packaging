<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fortuna Packaging — Impress With Impressions. Reliable, flexible, complete packaging solutions." />
    <meta name="theme-color" content="#001F3F" />
    <link rel="preload" href="/Fortuna-Packaging/images/brochure/company-plant.jpg" as="image" type="image/jpeg" />

    <title>Fortuna Packaging | Impress With Impressions</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
      .initial-skeleton-container {
        display: -webkit-box;
        display: -ms-flexbox;
        display: -webkit-flex;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-box-direction: normal;
        -ms-flex-direction: column;
        -webkit-flex-direction: column;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        width: 100%;
        overflow: hidden;
      }
      .skeleton-nav {
        height: 72px;
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        display: -webkit-box;
        display: -ms-flexbox;
        display: -webkit-flex;
        display: flex;
        -webkit-box-align: center;
        -ms-flex-align: center;
        -webkit-align-items: center;
        align-items: center;
        padding: 0 2rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        z-index: 50;
      }
      .skeleton-logo {
        width: 150px;
        height: 40px;
        background: #e2e8f0;
        border-radius: 4px;
        -webkit-animation: pulse 1.5s infinite ease-in-out;
        animation: pulse 1.5s infinite ease-in-out;
      }
      .skeleton-hero {
        -webkit-box-flex: 1;
        -ms-flex: 1;
        -webkit-flex: 1;
        flex: 1;
        background: #e2e8f0;
        display: -webkit-box;
        display: -ms-flexbox;
        display: -webkit-flex;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-box-direction: normal;
        -ms-flex-direction: column;
        -webkit-flex-direction: column;
        flex-direction: column;
        -webkit-box-align: center;
        -ms-flex-align: center;
        -webkit-align-items: center;
        align-items: center;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        -webkit-justify-content: center;
        justify-content: center;
        -webkit-animation: pulse 1.5s infinite ease-in-out;
        animation: pulse 1.5s infinite ease-in-out;
      }
      .skeleton-title {
        width: 60%;
        max-width: 600px;
        height: 60px;
        background: #cbd5e1;
        border-radius: 8px;
        margin-bottom: 24px;
      }
      .skeleton-subtitle {
        width: 40%;
        max-width: 400px;
        height: 30px;
        background: #cbd5e1;
        border-radius: 8px;
      }
      @-webkit-keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
      }
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-skeleton-container">
        <div class="skeleton-nav">
          <div class="skeleton-logo"></div>
        </div>
        <div class="skeleton-hero">
          <div class="skeleton-title"></div>
          <div class="skeleton-subtitle"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
